site_name: Notatki - Testowanie Oprogramowania
site_description: Notatki do egzaminu
theme:
  name: material
  language: pl
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Tryb ciemny
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Tryb jasny

plugins:
  - search:
      lang: pl

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3

nav:
  - Start: index.md
  - Kryteria oceny: kryteria-oceny.md
  - Blok 1 - Podstawy: blok-01-podstawy.md
  - Blok 2 - Statyczne: blok-02-statyczne.md
  - Blok 3 - Cykl życia: blok-03-cykl-zycia.md
  - Blok 4 - Analiza i projektowanie: blok-04-analiza-projektowanie.md
  - Blok 5 - Zarządzanie: blok-05-zarzadzanie.md
  - Blok 6 - Jednostkowe i integracyjne: blok-06-jednostkowe-integracyjne.md
  - Blok 7 - Wydajnościowe: blok-07-wydajnosciowe.md
  - Blok 8 - Kontraktowe: blok-08-kontraktowe.md
  - Blok 9 - Bezpieczeństwo i RODO: blok-09-bezpieczenstwo.md
  - Blok 10 - Generatywna AI: blok-10-genai.md
